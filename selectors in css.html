<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            background-color: red;
        }

        .yellow {
            background-color: yellow
        }

        #blue {
            background-color: blue;
        }

        /*child selector*/
        div>p {
            background-color: green;
        }

        /*decendent selector*/
        span p {
            background-color: purple;
        }

        /*universal selector*/
        * {

            color: skyblue
        }

        /*pseudo selector*/
        /* to see how this works, remove universal selectors above*/
        a:visited {
            color: red;
        }
    </style>
</head>

<body>
    <h1>selectors in css</h1>
    <div>
        hello i am anuj
    </div>
    <div class="yellow">
        hello i am anuj
    </div>
    <div id="blue">
        hello i am anuj
    </div>
    <div>
        <p> hello i am anuj</p>
    </div>
    xfngdn
    <span>
        <article>
            <p>hello i am anuj</p>
        </article>
    </span>

        target="_blank"> youtube:code with harry</a>

</body>

</html>
